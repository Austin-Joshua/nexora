spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:nexora_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,beans

server:
  port: 8080
  error:
    include-message: always

google:
  client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
  client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

claude:
  api-key: ${CLAUDE_API_KEY:mock-claude-api-key}
  api-url: https://api.anthropic.com/v1/messages
  model: claude-sonnet-4-5

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-that-is-at-least-512-bits-long-for-security-and-compliance-with-jwt-standards}
  expiration-ms: 86400000

app:
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  encryption-key: ${ENCRYPTION_KEY:12345678901234567890123456789012}

resilience4j:
  ratelimiter:
    instances:
      brain-query:
        limitForPeriod: 20
        limitRefreshPeriod: 1h
        timeoutDuration: 5s

logging:
  level:
    com.nexora: INFO
    org.springframework.security: WARN
    org.hibernate: WARN

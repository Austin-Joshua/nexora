<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nexora — Communication Intelligence Platform. AI-powered email classification, smart deadlines, and natural language Q&A over your Gmail inbox." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f0c030" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="google-site-verification" content="YRKCKh9cl0E2zBF8hTggw0ydUvJsK9RoAJ8xQ96zNyU" />
    <title>Nexora — Communication Intelligence Platform</title>
    <script>
      if (typeof global === 'undefined') {
        var global = window;
      }
      // Theme preload — runs before paint to avoid flash
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (saved === 'dark' || saved === 'light') ? saved : (prefersDark ? 'dark' : 'light');
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
